name: CI Setup
description: >
  Set up the shared CI environment — Python, Docker Compose validation,
  shared CLI dependencies, BuildKit, and Docker Hub authentication.
  Reads PYTHON_RUNTIME_VERSION, AWS_COMMAND_LINE_INTERFACE_VERSION,
  WORKER_DOCKER_COMPOSE_PROFILES, DOCKER_COMPOSE_BUILD_ARGUMENTS, and
  COMPOSE_FILE from the calling job's env.

inputs:
  docker-username:
    description: Docker Hub username for authenticated pulls
    required: false
    default: ""
  docker-password:
    description: Docker Hub password for authenticated pulls
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python runtime
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_RUNTIME_VERSION }}
        cache: pip

    - name: Validate Docker Compose availability
      shell: bash
      run: |
        docker --version
        docker compose version

    - name: Install shared command-line dependencies
      shell: bash
      run: |
        pip install --upgrade pip
        pip install awscli=="${AWS_COMMAND_LINE_INTERFACE_VERSION}"
        sudo rm -f /etc/boto.cfg
        mkdir -p "$HOME/.config/pip"
        {
          echo "[build_ext]"
          echo "parallel = 1"
        } > "$HOME/.config/pip/pip.conf"

    - name: Configure CI runtime limits
      shell: bash
      run: |
        ulimit -u 16384 || true
        ulimit -n 4096 || true

    - name: Log in to Docker Hub
      # Secrets are unavailable for fork PRs; skip login there to avoid errors.
      # Same-repo PRs have secrets available and benefit from authenticated pulls.
      if: >-
        github.event_name != 'pull_request' ||
        github.event.pull_request.head.repo.full_name == github.repository
      shell: bash
      env:
        DOCKER_USERNAME: ${{ inputs.docker-username }}
        DOCKER_PASSWORD: ${{ inputs.docker-password }}
      run: |
        if [ -n "${DOCKER_USERNAME}" ] && [ -n "${DOCKER_PASSWORD}" ]; then
          echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USERNAME}" --password-stdin
        else
          echo "Skipping Docker Hub authentication (secrets not configured)."
        fi

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images for CI
      shell: bash
      env:
        COMPOSE_BAKE: true
        DOCKER_BUILDKIT: 1
      run: |
        docker compose $WORKER_DOCKER_COMPOSE_PROFILES build $DOCKER_COMPOSE_BUILD_ARGUMENTS
